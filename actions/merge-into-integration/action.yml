name: 'Merge into integration'
description: 'Merges a branch into the integration branch and pushes it, failing on conflict.'

inputs:
  head_ref:
    description: 'Branch to merge into the integration branch (e.g. github.head_ref).'
    required: true
  integration_branch:
    description: 'Target long-lived integration branch.'
    required: false
    default: 'integration'
  git_user_name:
    description: 'Committer name for the merge commit.'
    required: false
    default: 'github-actions[bot]'
  git_user_email:
    description: 'Committer email for the merge commit.'
    required: false
    default: 'github-actions[bot]@users.noreply.github.com'

runs:
  using: 'composite'
  steps:
    - id: merge
      shell: bash
      env:
        HEAD_REF: ${{ inputs.head_ref }}
        INTEGRATION_BRANCH: ${{ inputs.integration_branch }}
        GIT_USER_NAME: ${{ inputs.git_user_name }}
        GIT_USER_EMAIL: ${{ inputs.git_user_email }}
      run: |
        set -euo pipefail
        git config user.name  "${GIT_USER_NAME}"
        git config user.email "${GIT_USER_EMAIL}"

        git fetch origin "${INTEGRATION_BRANCH}" "${HEAD_REF}"

        for attempt in 1 2 3; do
          echo "== Integration merge attempt ${attempt} =="
          git checkout -B "${INTEGRATION_BRANCH}" "origin/${INTEGRATION_BRANCH}"

          if ! git merge --no-ff "origin/${HEAD_REF}" \
                -m "ci: merge ${HEAD_REF} into ${INTEGRATION_BRANCH} [skip ci]"; then
            git merge --abort || true
            echo "::error::Conflitto mergiando ${HEAD_REF} in ${INTEGRATION_BRANCH}. Risolvi manualmente."
            exit 1
          fi

          if git push origin "${INTEGRATION_BRANCH}"; then
            echo "Pushed ${INTEGRATION_BRANCH}."
            exit 0
          fi

          echo "Push non-fast-forward: ${INTEGRATION_BRANCH} avanzato. Ri-fetch e ritento..."
          git fetch origin "${INTEGRATION_BRANCH}"
        done

        echo "::error::Push di ${INTEGRATION_BRANCH} fallito dopo 3 tentativi."
        exit 1
